<div class="flex flex-col items-center justify-center h-full p-8 text-center animate-fade-in">
    <div class="w-20 h-20 bg-red-100 dark:bg-red-500/10 rounded-full flex items-center justify-center mb-6">
        <span class="material-icons-round text-red-500 text-4xl">gpp_bad</span>
    </div>
    
    <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Acceso Restringido</h2>
    <p class="text-slate-500 dark:text-slate-400 max-w-md mx-auto mb-8">
        No tienes los permisos necesarios para ver este módulo principal o no tienes ninguna vista asignada. Si crees que esto es un error, por favor contacta al administrador del sistema.
    </p>

    <button [routerLink]="['/login']" (click)="logout()" class="px-6 py-2.5 bg-primary hover:bg-primary/90 text-white font-medium rounded-lg shadow-sm transition-all flex items-center gap-2">
        <span class="material-icons-round text-sm">logout</span>
        Volver al Login
    </button>
</div>
